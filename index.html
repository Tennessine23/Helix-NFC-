<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helix NFC Profile</title>

<style>
:root{
    --accent:#33457A;
    --accent-soft:#E2E6F0;
    --accent-text:#222F54;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Times New Roman", Times, serif;
}

body{
    background:var(--accent);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.card{
    width:100%;
    max-width:400px;
    background:#fff;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.15);
}

.header{
    height:90px;
    background:var(--accent-soft);
}

.profile-image{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid white;
    background:#ddd center center/cover no-repeat;
    margin:-60px auto 15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    font-weight:bold;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.content{
    padding:20px;
}

.name{
    text-align:center;
    font-size:24px;
    font-weight:700;
}

.title{
    text-align:center;
    color:#666;
    margin-top:4px;
}

.bio{
    text-align:center;
    margin-top:15px;
    line-height:1.6;
    color:#555;
}

.links{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.link{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border:1px solid #eee;
    border-radius:12px;
    text-decoration:none;
    color:#222;
    transition:.2s;
}

.link:hover{
    transform:translateY(-2px);
}

.icon{
    width:35px;
    height:35px;
    border-radius:50%;
    background:var(--accent-soft);
    display:flex;
    align-items:center;
    justify-content:center;
}

.contact{
    margin-top:25px;
    border-top:1px solid #eee;
    padding-top:20px;
}

.contact-item{
    margin-bottom:12px;
}

.controls{
    display:flex;
    justify-content:space-between;
    padding:15px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:10px;
}

.edit-btn{
    padding:10px 14px;
    background:var(--accent);
    color:white;
}

.color-picker{
    display:flex;
    gap:6px;
}

.color{
    width:22px;
    height:22px;
    border-radius:50%;
    cursor:pointer;
}

.editor{
    display:none;
    padding:20px;
    border-top:1px solid #eee;
}

.editor input,
.editor textarea{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

.save-btn{
    width:100%;
    background:var(--accent);
    color:white;
    padding:12px;
}

.upload{
    margin-bottom:10px;
}
    .actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.action-btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    text-align:center;
    text-decoration:none;
    font-weight:600;
    cursor:pointer;
    background:var(--accent);
    color:white;
}

.whatsapp-btn{
    background:#25D366;
}
    
</style>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="card">

    <div class="controls">
        <div class="color-picker">
            <div class="color" style="background:#C2552E" onclick="setAccent('#C2552E','#F4E4DC','#7A331A')"></div>
            <div class="color" style="background:#33415C" onclick="setAccent('#33415C','#E4E8EE','#1F2937')"></div>
            <div class="color" style="background:#3C6E47" onclick="setAccent('#3C6E47','#E2EDE3','#234A2D')"></div>
            <div class="color" style="background:#6B4577" onclick="setAccent('#6B4577','#ECE3EF','#432B4D')"></div>
            <div class="color" style="background:#33457A" onclick="setAccent('#33457A','#E2E6F0','#222F54')"></div>
        </div>

        <button class="edit-btn" onclick="toggleEditor()">Edit</button>
    </div>

    <div class="header"></div>

    <div class="profile-image" id="avatar">
    <span id="avatarInitials">MK</span>
</div>

    <div class="content">

        <div class="name" id="displayName">
            Matthew Karanja
        </div>

        <div class="title" id="displayTitle">
            CEO • Helix Tech
        </div>

        <div class="bio" id="displayBio">
            Tap. Connect. Remember.
        </div>

        <div class="links">

            <a class="link"
               href="https://www.instagram.com/chihiroyamanakasburner_"
               target="_blank">
                <div class="icon">
    <i class="fab fa-instagram"></i>
</div>
                Instagram
            </a>

            <a class="link"
               href="https://www.linkedin.com/in/matthew-karanja-642498364/?lipi=urn%3Ali%3Apage%3Ad_flagship3_profile_view_base_contact_details%3BqTCR4p7uRdqS4yOl9htuyg%3D%3D"
               target="_blank">
                <div class="icon">
    <i class="fab fa-linkedin-in"></i>
</div>
                LinkedIn
            </a>

            <a class="link"
               href="https://helixtech.co"
               target="_blank">
                <div class="icon">
    <i class="fas fa-globe"></i>
</div>
                Website
            </a>

        </div>

        <div class="contact">

            <div class="contact-item">
                📧 <span id="displayEmail">lmknganga@gmail.com</span>
            </div>

            <div class="contact-item">
                📱 <span id="displayPhone">+254 798184245</span>
            </div>

            <div class="contact-item">
                📍 <span id="displayLocation">Nairobi, Kenya</span>
            </div>

        </div>

    </div>
 <div class="actions">

    <button class="action-btn"
            onclick="saveContact()">
        💾 Save Contact
    </button>

    <a class="action-btn whatsapp-btn"
       id="whatsappLink"
       target="_blank">
       💬 WhatsApp
    </a>

</div>
    <div class="editor" id="editor">

        <label>Profile Photo</label>
           <input type="file" class="upload" id="photoUpload" accept="image/*">

        <label>Company Logo</label>
           <input type="file" class="upload" id="logoUpload" accept="image/*">

        <input id="nameInput" placeholder="Name">

        <input id="titleInput" placeholder="Title">

        <textarea id="bioInput" placeholder="Bio"></textarea>

        <input id="emailInput" placeholder="Email">

        <input id="phoneInput" placeholder="Phone">

        <input id="locationInput" placeholder="Location">

        <button class="save-btn" onclick="saveProfile()">
            Save Changes
        </button>

    </div>

</div>
    
<img id="hiddenLogo" style="display:none;">
    
 <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
    
<script>

    let companyTheme = {
    primary: "#33457A",
    secondary: "#E2E6F0",
    text: "#222F54"
}; 
    updateWhatsAppLink();
    
function toggleEditor(){
    const editor=document.getElementById("editor");

    editor.style.display=
    editor.style.display==="block"
    ? "none"
    : "block";
}

function saveProfile(){

    document.getElementById("displayName").textContent=
    document.getElementById("nameInput").value || "Matthew Karanja";

    document.getElementById("displayTitle").textContent=
    document.getElementById("titleInput").value || "CEO • Helix Tech";

    document.getElementById("displayBio").textContent=
    document.getElementById("bioInput").value;

    document.getElementById("displayEmail").textContent=
    document.getElementById("emailInput").value;

    document.getElementById("displayPhone").textContent=
    document.getElementById("phoneInput").value;

    document.getElementById("displayLocation").textContent=
    document.getElementById("locationInput").value;
    
const name =
document.getElementById("displayName").textContent;

const initials =
name.split(" ")
.map(word => word[0])
.join("")
.substring(0,2)
.toUpperCase();

const initialsElement =
document.getElementById("avatarInitials");

if(initialsElement){
    initialsElement.textContent = initials;
}
    toggleEditor();
}

function setAccent(primary, secondary, textColor){

    companyTheme = {
        primary,
        secondary,
        text: textColor
    };
    document.documentElement.style.setProperty(
        "--accent",
        primary
    );

    document.documentElement.style.setProperty(
        "--accent-soft",
        secondary
    );

    document.documentElement.style.setProperty(
        "--accent-text",
        textColor
    );

    document.body.style.background = primary;
}

document.getElementById("photoUpload")
.addEventListener("change",function(e){

    const file=e.target.files[0];
    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(ev){

        const avatar=document.getElementById("avatar");

        avatar.style.backgroundImage=
        `url(${ev.target.result})`;

        avatar.textContent="";
    };

    reader.readAsDataURL(file);
});
    
    const logoUpload =
document.getElementById("logoUpload");

logoUpload.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;

    const img =
    document.getElementById("hiddenLogo");

    img.src = URL.createObjectURL(file);

    img.onload = function(){

        const colorThief =
        new ColorThief();

        const palette =
        colorThief.getPalette(img, 5);

        const primary =
        `rgb(${palette[0][0]},
             ${palette[0][1]},
             ${palette[0][2]})`;

        const secondary =
        `rgb(${palette[1][0]},
             ${palette[1][1]},
             ${palette[1][2]})`;

        const textColor =
        getContrastColor(palette[0]);

        setAccent(
            primary,
            secondary,
            textColor
        );
    };
});
   
    function getContrastColor(rgb){

    const brightness =
    ((rgb[0] * 299) +
     (rgb[1] * 587) +
     (rgb[2] * 114)) / 1000;

    return brightness > 128
        ? "#000000"
        : "#FFFFFF";
}
    function updateWhatsAppLink(){

    const phone =
    document.getElementById("displayPhone")
    .textContent
    .replace(/\D/g,'');

    document.getElementById("whatsappLink")
    .href =
    `https://wa.me/${phone}`;
}

function saveContact(){

    const name =
    document.getElementById("displayName").textContent;

    const phone =
    document.getElementById("displayPhone").textContent;

    const email =
    document.getElementById("displayEmail").textContent;

    const company =
    document.getElementById("displayTitle").textContent;

    const vcard =
`BEGIN:VCARD
VERSION:3.0
FN:${name}
ORG:${company}
TEL:${phone}
EMAIL:${email}
END:VCARD`;

    const blob =
    new Blob([vcard], {
        type: "text/vcard"
    });

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = url;
    a.download = `${name}.vcf`;

    a.click();
}
    
</script>

</body>
</html>
